<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kalkulator Kelambatan KA - catkaujungtimur</title>
    <style>
        :root { --primary: #002d5e; --secondary: #f39c12; --success: #27ae60; --danger: #e74c3c; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, system-ui, sans-serif; background: #e9eef3; padding: 16px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .container { background: white; padding: 20px 16px; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 720px; transition: all 0.2s; }
        h2 { text-align: center; color: var(--primary); margin: 0 0 4px 0; font-size: 1.6rem; letter-spacing: -0.3px; }
        .sub { text-align: center; font-size: 13px; color: #2c3e66; margin-bottom: 12px; font-weight: 500; }
        .info { background: #fef5e8; border-left: 5px solid var(--secondary); padding: 10px 14px; border-radius: 12px; font-size: 13px; color: #b45f06; margin-bottom: 20px; font-weight: 500; text-align: center; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #d4dee8; padding: 12px 6px; text-align: center; vertical-align: middle; }
        th { background-color: var(--primary); color: white; font-weight: 600; font-size: 0.85rem; letter-spacing: 0.5px; }
        .time-input { width: 95px; padding: 10px 6px; border: 1px solid #cbd5e1; border-radius: 12px; text-align: center; font-size: 15px; font-family: 'JetBrains Mono', monospace; font-weight: 500; background: #fff; transition: 0.2s; }
        .time-input:focus { border-color: var(--secondary); outline: none; box-shadow: 0 0 0 2px rgba(243,156,18,0.3); }
        .lambat-input { width: 80px; padding: 10px 6px; border: 1px solid #cbd5e1; border-radius: 12px; text-align: center; font-size: 15px; font-weight: 600; font-family: monospace; background: #fff; }
        .lambat-input:focus { border-color: var(--secondary); outline: none; box-shadow: 0 0 0 2px rgba(243,156,18,0.3); }
        .btn-group { margin-top: 28px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 40px; background: var(--secondary); color: white; font-weight: bold; font-size: 14px; transition: transform 0.05s, background 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        button:active { transform: scale(0.97); }
        button:hover { filter: brightness(0.94); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-outline { background: #34495e; }
        footer { margin-top: 20px; font-size: 11px; color: #5a6e85; text-align: center; }
        @media (max-width: 550px) {
            .time-input { width: 75px; font-size: 13px; padding: 8px 4px; }
            .lambat-input { width: 65px; font-size: 13px; }
            td, th { padding: 8px 4px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🚆 Kalkulator Kelambatan KA</h2>
    <div class="sub">catkaujungtimur • sinyal otomatis</div>
    <div class="info">✨ Cukup isi 2 kolom manapun — kolom ke-3 akan terisi otomatis ✨</div>
    
    <table id="calcTable">
        <thead>
            <tr>
                <th>⏱️ Waktu Tepat (jadwal)</th>
                <th>🕒 Waktu Riil (aktual)</th>
                <th>⏳ Lambat (menit)</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="btn-group">
        <button onclick="addRow()" style="background:#2c3e50;">➕ Baris Baru</button>
        <button class="btn-success" onclick="exportJSON()">💾 Simpan JSON</button>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importJSON(event)">
        <button class="btn-outline" onclick="document.getElementById('importFile').click()">📂 Buka JSON</button>
        <button class="btn-danger" onclick="if(confirm('⚠️ Reset semua data? perubahan akan hilang.')) resetAllRows()">🔄 Reset Semua</button>
    </div>
    <footer>↺ Input otomatis: Tepat+Riil → Lambat | Tepat+Lambat → Riil | Riil+Lambat → Tepat</footer>
</div>

<script>
    // Helper: konversi string "HH:MM" ke menit (validasi ketat)
    function timeToMinutes(timeStr) {
        if (!timeStr || typeof timeStr !== 'string') return null;
        const trimmed = timeStr.trim();
        if (trimmed.length < 5) return null;
        // format harus HH:MM
        const regex = /^([01]?[0-9]|2[0-3]):([0-5][0-9])$/;
        if (!regex.test(trimmed)) return null;
        const parts = trimmed.split(':');
        const hours = parseInt(parts[0], 10);
        const minutes = parseInt(parts[1], 10);
        if (isNaN(hours) || isNaN(minutes)) return null;
        if (hours < 0 || hours > 23 || minutes < 0 || minutes > 59) return null;
        return (hours * 60) + minutes;
    }

    // menit ke string HH:MM (selalu valid)
    function minutesToTime(totalMins) {
        // normalisasi untuk range -12 jam sampai +12 jam, tetapi dipastikan 0-1439 untuk display
        let normalized = totalMins % 1440;
        if (normalized < 0) normalized += 1440;
        const hrs = Math.floor(normalized / 60);
        const mins = normalized % 60;
        return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;
    }

    // fungsi utama perbaikan logika: update field berdasarkan dua nilai yang terisi
    // ini akan dipanggil setelah setiap perubahan input, dan melakukan update silang secara cerdas
    function smartUpdate(row, triggeredInputType) {
        const tepatInput = row.querySelector(".tepat");
        const riilInput = row.querySelector(".riil");
        const lambatInput = row.querySelector(".lambat");

        let tepatVal = tepatInput.value.trim();
        let riilVal = riilInput.value.trim();
        let lambatValRaw = lambatInput.value.trim();

        const mTepat = timeToMinutes(tepatVal);
        const mRiil = timeToMinutes(riilVal);
        let mLambat = (lambatValRaw === "") ? NaN : parseInt(lambatValRaw, 10);

        // jika lambat tidak valid (NaN), maka kita anggap tidak terisi
        const isLambatValid = !isNaN(mLambat) && lambatValRaw !== "" && !isNaN(parseFloat(lambatValRaw));
        
        // --- Hitung berapa field yang terisi (valid) ---
        let filledCount = 0;
        if (mTepat !== null) filledCount++;
        if (mRiil !== null) filledCount++;
        if (isLambatValid) filledCount++;

        // Kondisi 1: Jika ketiganya valid, maka tidak perlu ubah apapun (sudah konsisten), tapi kita bisa cek konsistensi ringan opsional
        if (filledCount === 3) {
            // opsional: jika data tidak konsisten, prioritas ubah berdasarkan yg terakhir diubah? tapi biarkan stabil.
            // lebih baik biarkan saja, user sudah punya 3 nilai. Tapi jika terjadi inkonsistensi matematis, kita bisa pilih perbaiki berdasarkan trigger?
            // demi UX mulus, jika semua terisi tapi tidak sinkron (misal tepat+riil menghasilkan lambat berbeda), maka kita sinkronkan sesuai 2 terakhir ?
            // Agar lebih intuitif: jika ketiga terisi, kita hitung ulang berdasarkan tepat dan riil (atau tepat+lambat) 
            // supaya data tetap logis. Tapi pengguna mungkin ingin mengedit salah satu, jadi lebih baik jangan overwrite paksa.
            // Untuk menghindari kebingungan, kita hanya melakukan update jika ada ketidakcocokan berdasarkan prioritas trigger? 
            // Karena tombol reset dan json bisa, kita tidak perlu ubah semua jika sudah konsisten.
            // TAPI jika misalnya data tidak cocok (contoh tepat=10:00, riil=10:10, lambat=5) jelas error. Kita lakukan perbaikan dengan prioritas:
            // Jika tidak konsisten, gunakan dua field yang paling baru (trigger) untuk mengoreksi yang ketiga.
            // Tetapi untuk keandalan, kita lakukan pengecekan konsistensi: hitung lambat dari tepat & riil, bandingkan.
            if (mTepat !== null && mRiil !== null) {
                let diffFromTR = mRiil - mTepat;
                // handle lintas tengah malam (wrap)
                if (diffFromTR < -720) diffFromTR += 1440;
                else if (diffFromTR > 720) diffFromTR -= 1440;
                if (isLambatValid && Math.abs(diffFromTR - mLambat) > 1) {
                    // tidak konsisten: update lambat berdasarkan tepat & riil
                    lambatInput.value = diffFromTR;
                }
            }
            return;
        }

        // ================ LOGIKA UTAMA =================
        // Kasus 1: Tepat & Riil terisi -> hitung Lambat
        if (mTepat !== null && mRiil !== null) {
            let diff = mRiil - mTepat;
            // handling midnight crossing (jika selisih ekstrim)
            if (diff < -720) diff += 1440;
            else if (diff > 720) diff -= 1440;
            lambatInput.value = diff;
            return;
        }
        
        // Kasus 2: Tepat & Lambat terisi -> hitung Riil
        if (mTepat !== null && isLambatValid) {
            const calculatedRiil = mTepat + mLambat;
            riilInput.value = minutesToTime(calculatedRiil);
            return;
        }
        
        // Kasus 3: Riil & Lambat terisi -> hitung Tepat (ini yang sebelumnya error, sekarang fix total)
        if (mRiil !== null && isLambatValid) {
            const calculatedTepat = mRiil - mLambat;
            // Pastikan hasil tetap dalam range waktu yang wajar (0-1439 menit)
            tepatInput.value = minutesToTime(calculatedTepat);
            return;
        }
        
        // Kondisi tambahan: jika hanya satu field yang terisi atau kosong semua, tidak perlu update
        // tetapi jika hanya tepat terisi & lambat sebelumnya terisi tapi kosong? tidak ada aksi
        // Agar pengalaman mulus, jika hanya lambat terisi dan tidak ada waktu, tidak ada perubahan
        // jika hanya riil terisi & lambat tidak ada, tidak ada.
        // optional: jika trigger adalah lambat dan tepat null & riil null -> nothing
        // JIKA user mengosongkan salah satu field, maka otomatis kita tidak overwrite berlebihan
    }

    // Fungsi untuk memformat input waktu agar selalu HH:MM dan memanggil smartUpdate
    function handleTimeInput(el, fieldType) {
        // formatting otomatis
        let raw = el.value.replace(/\D/g, '');
        if (raw.length > 4) raw = raw.slice(0, 4);
        let formatted = raw;
        if (raw.length >= 3) {
            let hourPart = raw.substring(0, 2);
            let minutePart = raw.substring(2, 4);
            if (parseInt(hourPart) > 23) hourPart = "23";
            if (minutePart.length === 2 && parseInt(minutePart) > 59) minutePart = "59";
            formatted = `${hourPart}:${minutePart}`;
        } else if (raw.length === 2) {
            let hourVal = parseInt(raw);
            if (hourVal > 23) hourVal = 23;
            formatted = `${hourVal.toString().padStart(2, '0')}:`;
        } else {
            formatted = raw;
        }
        el.value = formatted;
        
        const row = el.closest("tr");
        // panggil update pintar
        smartUpdate(row, fieldType);
    }

    // khusus untuk input lambat (number)
    function handleLambatInput(el) {
        let val = el.value.trim();
        if (val === "") {
            // jika dikosongkan, kita tetap panggil update untuk menghapus ketergantungan
            const row = el.closest("tr");
            smartUpdate(row, 'lambat');
            return;
        }
        let num = parseInt(val, 10);
        if (isNaN(num)) {
            el.value = "";
            const row = el.closest("tr");
            smartUpdate(row, 'lambat');
            return;
        }
        // optional: batasi rentang -999 sampai 999 (realistis)
        if (num > 999) num = 999;
        if (num < -999) num = -999;
        el.value = num;
        const row = el.closest("tr");
        smartUpdate(row, 'lambat');
    }

    // Membuat baris baru dengan data opsional (untuk import / inisialisasi)
    function addRow(data = { tepat: "", riil: "", lambat: "" }) {
        const tbody = document.querySelector("#calcTable tbody");
        const row = document.createElement("tr");

        // buat input tepat
        const tepatInput = document.createElement("input");
        tepatInput.type = "text";
        tepatInput.className = "time-input tepat";
        tepatInput.value = data.tepat || "";
        tepatInput.placeholder = "00:00";
        tepatInput.maxLength = 5;
        tepatInput.addEventListener("input", function() { handleTimeInput(this, 'tepat'); });
        
        const riilInput = document.createElement("input");
        riilInput.type = "text";
        riilInput.className = "time-input riil";
        riilInput.value = data.riil || "";
        riilInput.placeholder = "00:00";
        riilInput.maxLength = 5;
        riilInput.addEventListener("input", function() { handleTimeInput(this, 'riil'); });
        
        const lambatInput = document.createElement("input");
        lambatInput.type = "number";
        lambatInput.className = "lambat-input lambat";
        lambatInput.value = (data.lambat !== undefined && data.lambat !== "") ? data.lambat : "";
        lambatInput.placeholder = "menit";
        lambatInput.step = "1";
        lambatInput.addEventListener("input", function() { handleLambatInput(this); });
        
        const td1 = document.createElement("td");
        const td2 = document.createElement("td");
        const td3 = document.createElement("td");
        td1.appendChild(tepatInput);
        td2.appendChild(riilInput);
        td3.appendChild(lambatInput);
        
        row.appendChild(td1);
        row.appendChild(td2);
        row.appendChild(td3);
        tbody.appendChild(row);
        
        // setelah menambahkan baris, jika ada data default yang terisi, lakukan sinkronisasi agar kolom ketiga langsung terhitung
        if ((data.tepat && data.riil) || (data.tepat && data.lambat) || (data.riil && data.lambat)) {
            smartUpdate(row, 'tepat'); // panggil update untuk memastikan konsistensi
        }
    }

    // reset semua baris (bersihkan total)
    function resetAllRows() {
        const tbody = document.querySelector("#calcTable tbody");
        tbody.innerHTML = "";
        // default tambahkan 3 baris kosong agar tidak kosong
        for(let i=0; i<3; i++) addRow();
    }

    // export JSON
    function exportJSON() {
        const rows = document.querySelectorAll("#calcTable tbody tr");
        const data = Array.from(rows).map(row => ({
            tepat: row.querySelector(".tepat").value,
            riil: row.querySelector(".riil").value,
            lambat: row.querySelector(".lambat").value
        })).filter(item => item.tepat || item.riil || item.lambat);
        if (data.length === 0) {
            alert("Tidak ada data untuk disimpan.");
            return;
        }
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `kelambatan_ka_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    // import JSON
    function importJSON(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (!Array.isArray(importedData)) throw new Error("Format harus array");
                const tbody = document.querySelector("#calcTable tbody");
                tbody.innerHTML = "";
                if (importedData.length === 0) {
                    for(let i=0;i<3;i++) addRow();
                } else {
                    importedData.forEach(item => {
                        const tepatStr = item.tepat || "";
                        const riilStr = item.riil || "";
                        let lambatVal = (item.lambat !== undefined && item.lambat !== "") ? item.lambat : "";
                        addRow({ tepat: tepatStr, riil: riilStr, lambat: lambatVal });
                    });
                }
                // setelah import, paksa sinkronisasi untuk semua baris (menghindari inkonsistensi)
                const allRows = document.querySelectorAll("#calcTable tbody tr");
                allRows.forEach(row => {
                    // lakukan update ulang berdasarkan field yang terisi
                    const tepatVal = row.querySelector(".tepat").value.trim();
                    const riilVal = row.querySelector(".riil").value.trim();
                    const lambatVal = row.querySelector(".lambat").value.trim();
                    if ((tepatVal && riilVal) || (tepatVal && lambatVal) || (riilVal && lambatVal)) {
                        smartUpdate(row, 'tepat');
                    }
                });
            } catch (err) {
                alert("Gagal memuat JSON: " + err.message);
                console.error(err);
            } finally {
                event.target.value = "";
            }
        };
        reader.readAsText(file);
    }

    // inisialisasi awal: 5 baris kosong namun lebih user-friendly
    function initDefaultRows() {
        const tbody = document.querySelector("#calcTable tbody");
        tbody.innerHTML = "";
        // kita buat 5 baris dengan placeholder kosong, tetapi beberapa contoh agar paham fitur?
        // Tapi lebih baik 4 baris kosong penuh.
        for(let i=0; i<4; i++) addRow();
        // tambahkan baris contoh edukatif (tapi tidak mengganggu, bisa dihapus user)
        // biarkan kosong agar user langsung coba.
    }
    
    // Attach event untuk global biar tidak bentrok
    window.addEventListener("DOMContentLoaded", () => {
        initDefaultRows();
    });
    
    // tambahkan method ke window agar tombol2 bisa akses
    window.addRow = () => addRow();
    window.exportJSON = exportJSON;
    window.importJSON = importJSON;
    window.resetAllRows = resetAllRows;
</script>
</body>
</html>
